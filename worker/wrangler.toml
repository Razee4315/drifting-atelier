name = "drifting-atelier-share"
main = "src/worker.js"
compatibility_date = "2024-12-01"

# R2 bucket for uploaded images. Create it once with:
#   wrangler r2 bucket create drifting-atelier-images
[[r2_buckets]]
binding = "MEMORY_BUCKET"
bucket_name = "drifting-atelier-images"

# KV namespace for canvas JSON. Create it once with:
#   wrangler kv:namespace create DRIFTING_CANVASES
# Then paste the returned id below.
[[kv_namespaces]]
binding = "MEMORY_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Logs visible in `wrangler tail`
[observability]
enabled = true
